<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Tic-Tac-Toe | Game</title>
        <link rel="stylesheet" href="../Styles/tictactoe.css">
        <link rel="icon" href="../Photos/favicon.ico">
    </head>

    <body>
        <header class="header-top">
            <a class="backhome" href="../index.html">HOME</a>

            <h1>Tic-Tac-Toe</h1>
        </header>

        <div class="game">
            <button class="square" data-row="0" data-col="0" onclick="TypeSymbol(this)"></button>
            <button class="square" data-row="0" data-col="1" onclick="TypeSymbol(this)"></button>
            <button class="square" data-row="0" data-col="2" onclick="TypeSymbol(this)"></button>

            <button class="square" data-row="1" data-col="0" onclick="TypeSymbol(this)"></button>
            <button class="square" data-row="1" data-col="1" onclick="TypeSymbol(this)"></button>
            <button class="square" data-row="1" data-col="2" onclick="TypeSymbol(this)"></button>

            <button class="square" data-row="2" data-col="0" onclick="TypeSymbol(this)"></button>
            <button class="square" data-row="2" data-col="1" onclick="TypeSymbol(this)"></button>
            <button class="square" data-row="2" data-col="2" onclick="TypeSymbol(this)"></button>
        </div>

        <a id="res"></a>
        
        <script src="../Scripts/tictactoe.js"></script>
    </body>
</html>
